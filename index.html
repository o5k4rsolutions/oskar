<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIZEPL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://unpkg.com/@pdf-lib/fontkit@1.1.1/dist/fontkit.umd.min.js"></script>
    <style>
        body { background-color: #f0f4f8; font-family: 'Inter', sans-serif; }
        .drop-zone { border: 3px dashed #3b82f6; transition: all 0.3s ease; background: white; }
        .drop-zone.dragover { background-color: #dbeafe; border-color: #2563eb; transform: scale(1.00); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-lg text-center border border-gray-200">
        <div class="mb-8">
            <h1 class="text-4xl font-black text-gray-900 tracking-tight">oski <span class="text-blue-600">GWO</span></h1>
            <p class="text-gray-500 mt-2 font-medium">wkrótce ws</p>
        </div>

        <div id="dropZone" class="drop-zone rounded-3xl p-12 cursor-pointer mb-6 shadow-sm">
            <div id="statusMessage">
                <div class="bg-blue-100 w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-5 shadow-inner">
                    <svg class="w-10 h-10 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                </div>
                <p class="text-lg font-bold text-gray-800">Wgraj plik PDF</p>
                <p class="text-sm text-gray-400 mt-2 italic">Powered by: OSC4R Solutions</p>
            </div>
            <input type="file" id="fileInput" class="hidden" accept="application/pdf">
        </div>

        <div id="actionContainer" class="hidden space-y-4">
            <div class="bg-green-50 border border-green-200 rounded-2xl p-4 mb-4">
                <p id="fileNameDisplay" class="text-green-700 font-bold truncate"></p>
            </div>
            <button id="processBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl transition-all shadow-xl active:scale-95 text-lg uppercase tracking-widest">
                Start
            </button>
            <button onclick="location.reload()" class="text-gray-400 hover:text-gray-600 text-sm font-semibold transition-colors">Wybierz inny plik</button>
        </div>

        <div id="notification" class="hidden mt-8 p-5 rounded-2xl text-sm font-bold shadow-sm"></div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        const { PDFDocument, rgb } = PDFLib;
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const processBtn = document.getElementById('processBtn');
        const actionContainer = document.getElementById('actionContainer');
        const notification = document.getElementById('notification');
        const fileNameDisplay = document.getElementById('fileNameDisplay');

        const FIXED_FONT_URL = "https://raw.githubusercontent.com/MiasteczkoZawiczyn/pomocniknr1/main/cambria.ttf";
        const SEARCH_PHRASES = [
            "Wybór zadań: KATARZYNA KRYSZAK",
            "Wybór zadań: Rafał Maron",
            "Wybór zadań:"
        ];
        const TARGET_TEXT = "Wybór zadań: OSKAR DOBROSZKIEWICZ";

        let currentFileBytes = null;
        let currentFileName = "";

        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); });
        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

        function handleFile(file) {
            if (file && file.type === 'application/pdf') {
                currentFileName = file.name;
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentFileBytes = e.target.result;
                    fileNameDisplay.textContent = `Wybrano: ${file.name}`;
                    actionContainer.classList.remove('hidden');
                    dropZone.classList.add('hidden');
                };
                reader.readAsArrayBuffer(file);
            }
        }

        async function findTextPositions(pdfBytes) {
            const loadingTask = pdfjsLib.getDocument({ data: pdfBytes.slice(0) });
            const pdf = await loadingTask.promise;
            const results = [];

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                
                textContent.items.forEach(item => {
                    const foundPhrase = SEARCH_PHRASES.find(p => item.str.toLowerCase().includes(p.toLowerCase()));
                    if (foundPhrase) {
                        results.push({
                            pageIndex: i - 1,
                            x: item.transform[4],
                            y: item.transform[5],
                            width: item.width,
                            height: item.height,
                            fontSize: item.transform[0],
                            originalStr: item.str
                        });
                    }
                });
            }
            return results;
        }

        async function modifyPdf() {
            if (!currentFileBytes) return;

            try {
                showNotification("Trwa generowanie PDF...", "bg-blue-100 text-blue-700 animate-pulse");
                
                const fontRes = await fetch(FIXED_FONT_URL);
                if (!fontRes.ok) throw new Error("Błąd pobierania czcionki.");
                const fontBytes = await fontRes.arrayBuffer();

                const positions = await findTextPositions(currentFileBytes);
                if (positions.length === 0) {
                    showError("Nie znaleziono nazwisk do podmiany.");
                    return;
                }

                const pdfDoc = await PDFDocument.load(currentFileBytes);
                pdfDoc.registerFontkit(fontkit);
                const customFont = await pdfDoc.embedFont(fontBytes);
                const pages = pdfDoc.getPages();

                positions.forEach(pos => {
                    const page = pages[pos.pageIndex];
                    
                    const maskWidth = 250; 
                    
                    page.drawRectangle({
                        x: pos.x - 2,
                        y: pos.y - 3,
                        width: maskWidth, 
                        height: pos.height + 5,
                        color: rgb(1, 1, 1),
                    });

                    let finalFontSize = 10;
                    
                    page.drawText(TARGET_TEXT, {
                        x: pos.x,
                        y: pos.y,
                        size: finalFontSize,
                        font: customFont,
                        color: rgb(0, 0, 0),
                    });
                });

                const modifiedBytes = await pdfDoc.save();
                const blob = new Blob([modifiedBytes], { type: 'application/pdf' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `gwo_{currentFileName}`;
                link.click();
                showSuccess(`EDYTOWANO ${positions.length} stron.`);
            } catch (err) {
                showError("Błąd: " + err.message);
            }
        }

        function showNotification(msg, classes) {
            notification.className = `mt-8 p-5 rounded-2xl text-sm font-bold shadow-sm ${classes}`;
            notification.textContent = msg;
            notification.classList.remove('hidden');
        }
        function showError(msg) { showNotification(msg, "bg-red-100 text-red-700"); }
        function showSuccess(msg) { showNotification(msg, "bg-green-100 text-green-700"); }

        processBtn.addEventListener('click', modifyPdf);
    </script>
</body>
</html>
